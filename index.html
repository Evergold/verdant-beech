<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verdant Beech - Cartography Assistant</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <!-- Modular UI Layout -->
    <div id="app-container">
      <!-- Left Toolbar -->
      <nav id="side-toolbar">
        <button id="nav-assistant" class="nav-btn active" title="Assistant Tool">
          <span class="icon">🤖</span>
          <span class="badge hidden" id="assistant-badge">!</span>
        </button>
        <button id="nav-library" class="nav-btn" title="Library Manager">
          <span class="icon">📚</span>
        </button>
        <button id="nav-style" class="nav-btn" title="Style Guidelines">
          <span class="icon">🎨</span>
        </button>
        <button id="nav-asset" class="nav-btn" title="Asset Generator">
          <span class="icon">✨</span>
        </button>
      </nav>

      <!-- Panels Container -->
      <div id="panel-container">
        <!-- Sidecar Chat Panel -->
        <aside id="assistant-panel" class="panel active">
        <header id="chat-header">
          <h2 data-i18n="chat.title">Assistant Tool</h2>
          <div class="model-selection-group">
            <div id="reasoning-tabs" class="reasoning-tabs">
              <button class="reasoning-tab level-low" id="tab-low" data-level="low">LOW</button>
              <button class="reasoning-tab level-med" id="tab-med" data-level="med">MED</button>
              <button class="reasoning-tab level-high active" id="tab-high" data-level="high">HIGH</button>
            </div>
            <select id="model-select">
              <!-- Populated dynamically via models.yaml -->
            </select>
          </div>
          
          <div class="monitor-bar">
            <div id="task-monitor">ACTIVE TASKS: <span id="task-count">0</span></div>
            <div id="hardware-monitor" class="hidden">
              <span class="hw-label">RAM:</span> <span id="ram-use">0.0</span>
              <span class="hw-label">VRAM:</span> <span id="vram-use">0.0</span>
            </div>
          </div>
        </header>

        <div id="toast-container"></div>

        <div id="download-ui" class="hidden">
          <div class="download-info">Downloading model... <span id="download-percent">0%</span></div>
          <div class="download-controls">
            <progress id="download-progress" value="0" max="100"></progress>
            <button id="download-pause-btn">Pause</button>
          </div>
        </div>

        <div id="chat-history"></div>
        
        <div id="chat-input-container">
          <textarea id="chat-input" data-i18n-placeholder="chat.placeholder" placeholder="Ask for a map or style advice..."></textarea>
          <button id="send-btn" data-i18n="chat.send">Send</button>
        </div>
        </aside>

        <!-- Library Manager -->
        <aside id="library-panel" class="panel">
          <header class="panel-header">
            <h2>Library Manager</h2>
          </header>
          <div class="panel-content">
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 12px;">Manage portfolios, tags, and assets here.</p>
            
            <div class="library-controls">
              <input type="text" id="new-folder-input" placeholder="New Portfolio Name..." />
              <button id="create-folder-btn">Create</button>
            </div>
            
            <div id="library-folders-list" class="folder-list">
              <!-- Folders populated via JS -->
            </div>
          </div>
        </aside>

        <!-- Style Guidelines -->
        <aside id="style-panel" class="panel">
          <header class="panel-header">
            <h2>Style Guidelines</h2>
          </header>
          <div class="panel-content">
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 12px;">Configure Verdant's generation rules.</p>
            
            <div class="style-controls">
              <label class="style-label">Environment Lighting</label>
              <select id="env-lighting-select" class="style-select">
                <option value="uniform">Uniform Studio (Default)</option>
                <option value="candle">Moody Candlelit</option>
              </select>
            </div>
          </div>
        </aside>

        <!-- Asset Generator Panel -->
        <aside id="asset-panel" class="panel">
          <header class="panel-header">
            <h2>Asset Generator</h2>
          </header>
          <div class="panel-content">
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 12px;">Create and hone bespoke assets.</p>
            
            <div class="asset-controls">
              <label class="toggle-container" title="Bypass Style Guidelines to freely experiment">
                <input type="checkbox" id="exploratory-mode-toggle">
                <span class="toggle-slider"></span>
                Exploratory Mode
              </label>
              
              <textarea id="asset-prompt-input" placeholder="Describe the asset (e.g. 'A glowing blue mushroom')..." rows="3"></textarea>
              <button id="generate-asset-btn" class="primary-btn">Generate Asset</button>
            </div>
            
            <div id="asset-preview-container" class="hidden">
              <img id="asset-preview-img" src="" alt="Asset Preview" />
              <div class="asset-save-controls">
                <input type="text" id="asset-save-name" placeholder="Asset Name (e.g. blue_mushroom)" />
                <button id="save-asset-btn">Save to Library</button>
              </div>
            </div>
          </div>
        </aside>
      </div>
      
      <!-- Main Canvas Area -->
      <main id="canvas-panel" style="position: relative;">
        <div id="canvas-ui-layer" style="position: absolute; top: 16px; right: 16px; z-index: 10;">
          <button id="toggle-orientation-btn" class="icon-btn" title="Toggle Portrait/Landscape">🔄 Orientation</button>
        </div>
        <canvas id="renderCanvas"></canvas>
      </main>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
