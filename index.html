<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verdant Beech - Cartography Assistant</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <!-- Modular UI Layout -->
    <div id="app-container">
      <!-- Sidecar Chat Panel -->
      <aside id="chat-panel">
        <header id="chat-header">
          <h2 data-i18n="chat.title">Cartographer Assistant</h2>
          <div class="header-controls">
            <select id="model-select">
              <option value="gemini/gemini-1.5-flash-latest">Gemini 1.5 Flash</option>
              <option value="gemini/gemini-1.5-pro-latest">Gemini 1.5 Pro</option>
              <option value="ollama_chat/gemma-4-e4b">Gemma 4 E4B (4.5B Local)</option>
              <option value="groq/llama3-8b-8192">Llama 3 8B (Groq)</option>
            </select>
            <div id="task-monitor">Tasks: <span id="task-count">0</span></div>
          </div>
        </header>
        <div id="chat-history"></div>
        <div id="chat-input-container">
          <textarea id="chat-input" data-i18n-placeholder="chat.placeholder" placeholder="Ask for a map or style advice..."></textarea>
          <button id="send-btn" data-i18n="chat.send">Send</button>
        </div>
      </aside>
      
      <!-- Main Canvas Area -->
      <main id="canvas-panel">
        <canvas id="renderCanvas"></canvas>
      </main>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
